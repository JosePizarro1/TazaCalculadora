<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance P2P | Calculadora de Remesas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

    <main class="main-container">
        <header class="hero">
            <h1 class="hero-title">Calculadora <span class="gradient-text">P2P Remesas</span></h1>
        </header>

        <section class="calculator-card">
            <!-- Resultado Principal -->
            <div class="result-hero">
                <div class="result-label">EL CLIENTE RECIBE</div>
                <div class="result-value-big">
                    <span id="displayResult">0.00</span>
                    <span style="font-size: 1.5rem;" id="destSymbol">S/</span>
                </div>
                <div id="summaryText" style="color: var(--text-muted); font-size: 0.85rem;">Cargando tasas...</div>
            </div>

            <!-- Inputs -->
            <div class="input-row">
                <div class="input-group">
                    <label class="input-label">Monto a Enviar</label>
                    <input type="number" id="inputAmount" class="custom-input" value="1500">
                </div>
                <div class="input-group">
                    <label class="input-label">Moneda Origen</label>
                    <select id="fiatOrigin" class="custom-select">
                        {% for code, info in fiat_currencies.items() %}
                        <option value="{{ code }}" {% if code=='CLP' %}selected{% endif %}>{{ info.flag }} {{ code }} —
                            {{ info.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="input-group">
                    <label class="input-label">Moneda Destino</label>
                    <select id="fiatDest" class="custom-select">
                        {% for code, info in fiat_currencies.items() %}
                        <option value="{{ code }}" {% if code=='PEN' %}selected{% endif %}>{{ info.flag }} {{ code }} —
                            {{ info.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Tasas y Resumen -->
            <div style="display: grid; grid-template-columns: 180px 1fr; gap: 20px; margin-bottom: 24px;">
                <div class="metrics-column">
                    <div class="metric-card" style="margin-bottom: 15px;">
                        <div class="metric-title">TASA:</div>
                        <div class="metric-value" id="marketRate" style="font-size: 0.9rem;">0.00000000</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-title">TASA AJUSTADA:</div>
                        <div class="metric-value" id="finalRate" style="color: var(--gold-primary);">0.00</div>
                    </div>
                </div>

                <div class="summary-container">
                    <div class="input-label"
                        style="text-align: center; color: var(--gold-primary); margin-bottom: 5px;">RESUMEN</div>
                    <div class="summary-box" id="summaryBox">
                        POR ENVIAR <span id="sumAmount">0</span> <span id="sumOrigin">CLP</span> RECIBE <span
                            id="sumResult">0.00</span> <span id="sumDest">S/</span>
                    </div>

                    <!-- Ganancias (Volviendo a ponerlas como pidió el usuario) -->
                    <div class="profit-grid" style="margin-top: 15px;">
                        <div class="profit-card">
                            <div class="metric-title" style="color: var(--gold-light);">GANANCIA POR ENVIAR</div>
                            <div class="metric-value" id="profitOrigin">0.00</div>
                        </div>
                        <div class="profit-card">
                            <div class="metric-title" style="color: var(--gold-light);">GANANCIA POR RECIBIR</div>
                            <div class="metric-value" id="profitDest">0.00</div>
                        </div>
                    </div>
                </div>
            </div>

            <button id="btnCalculate" class="btn-primary">Actualizar Tasas en Vivo</button>
        </section>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>

</html>
